<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Glass Card</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #2b2b2b, #4a4a4a, #2b2b2b);
  overflow:hidden;
}

body::before {
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: linear-gradient(120deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
  animation: bgMove 20s linear infinite;
}

@keyframes bgMove {
  from { transform: translate(0,0); }
  to { transform: translate(-50%, -50%); }
}

.card {
  position:relative;
  width:320px;
  padding:28px 22px;
  border-radius:28px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border:1px solid rgba(255,255,255,0.25);
  box-shadow:
    0 10px 40px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.2);
  text-align:center;
  color:#fff;
  overflow:hidden;
}

.card::after {
  content:"";
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background: linear-gradient(
    120deg,
    transparent 40%,
    rgba(255,255,255,0.25) 50%,
    transparent 60%
  );
  transform: rotate(25deg);
  animation: shine 6s infinite;
}

@keyframes shine {
  0% { transform: translateX(-100%) rotate(25deg); }
  100% { transform: translateX(100%) rotate(25deg); }
}

.logo-circle {
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  margin:0 auto 18px;
  border:2px solid rgba(255,255,255,0.3);
}

.logo-circle img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.name-box {
  display:inline-block;
  padding:6px 14px;
  border-radius:12px;
  background: linear-gradient(135deg, #ff7a00, #ff9a3c);
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.eng {
  font-size:16px;
  color:#ff9a3c;
  margin-bottom:18px;
}

.info {
  text-align:left;
  font-size:14px;
  line-height:2;
  margin-bottom:18px;
}

.info div {
  display:flex;
  gap:8px;
}

.info strong {
  width:20px;
  color:#ddd;
}

.info a {
  color:#fff;
  text-decoration:none;
}

.button-group {
  display:flex;
  flex-direction:column;
  gap:12px;
}

.btn {
  width:100%;
  padding:14px;
  border-radius:16px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color:#fff;
  text-align:center;
  text-decoration:none;
  cursor:pointer;
  transition: all 0.2s ease;
  font-size:15px;
}

button.btn {
  appearance:none;
  -webkit-appearance:none;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.2);
  font: inherit;
}

.btn:hover {
  background: rgba(255,255,255,0.3);
}

.btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="card">

  <div class="logo-circle">
    <img src="logo.png">
  </div>

  <div class="name-box" id="nameKo"></div>
  <div class="eng" id="engName"></div>

  <div class="info">
    <div><strong>T:</strong> <a id="telWork"></a></div>
    <div><strong>F:</strong> <span id="fax"></span></div>
    <div><strong>M:</strong> <a id="telMobile"></a></div>
    <div><strong>E:</strong> <a id="email"></a></div>
  </div>

  <div class="button-group">
    <button class="btn" onclick="saveContact()">📇 연락처 저장</button>
    <a href="#" id="callBtn" class="btn">📞 전화 걸기</a>
    <a href="http://www.e-pki.com/" target="_blank" class="btn">🌐 PKI 홈페이지</a>
  </div>

</div>

<script>
const CONTACT = {
  nameKo: "김경원 (金景媛)",
  name: "Ellie Kim",
  firstName: "Ellie",
  lastName: "Kim",
  title: "Manager",
  telWork: "+82.31.378.7590",
  fax: "+82.31.378.7591",
  telMobile: "+82.10.2038.1341",
  email: "ellie.kim@e-pki.com"
};

document.getElementById("nameKo").innerText = CONTACT.nameKo;
document.getElementById("engName").innerText = CONTACT.name;

document.getElementById("telWork").innerText = CONTACT.telWork;
document.getElementById("telWork").href = "tel:" + CONTACT.telWork;

document.getElementById("fax").innerText = CONTACT.fax;

document.getElementById("telMobile").innerText = CONTACT.telMobile;
document.getElementById("telMobile").href = "tel:" + CONTACT.telMobile;

document.getElementById("email").innerText = CONTACT.email;
document.getElementById("email").href = "mailto:" + CONTACT.email;

document.getElementById("callBtn").href = "tel:" + CONTACT.telMobile;

function saveContact() {
  const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:${CONTACT.name}
N:${CONTACT.lastName};${CONTACT.firstName};;;
ORG:PKI
TITLE:${CONTACT.title}
TEL;TYPE=WORK:${CONTACT.telWork}
TEL;TYPE=CELL:${CONTACT.telMobile}
EMAIL:${CONTACT.email}
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "contact.vcf";
  link.click();
}
</script>

</body>
</html>
