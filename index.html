<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Premium Glass Card</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #2b2b2b, #4a4a4a, #2b2b2b);
}

/* 카드 */
.card {
  width:90%;
  max-width:360px;
  padding:30px 20px;
  border-radius:28px;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(25px);
  border:1px solid rgba(255,255,255,0.25);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  text-align:center;
  color:#fff;
}

/* 로고 */
.logo-circle {
  width:90px;
  height:90px;
  border-radius:50%;
  overflow:hidden;
  margin:0 auto 18px;
  border:2px solid rgba(255,255,255,0.3);
}

.logo-circle img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 이름 */
.name-box {
  display:inline-block;
  padding:6px 14px;
  border-radius:12px;
  background: linear-gradient(135deg, #ff7a00, #ff9a3c);
  font-size:18px;
  font-weight:600;
  margin-bottom:6px;
}

.eng {
  font-size:16px;
  color:#ff9a3c;
  margin-bottom:20px;
}

/* 버튼 그룹 */
.button-group {
  display:flex;
  flex-direction:column;
  gap:12px;
}

/* 버튼 */
.btn {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  width:100%;
  padding:14px;
  border-radius:16px;
  border:none;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(10px);
  color:#fff;
  text-decoration:none;
  font-size:15px;
  cursor:pointer;
  transition: all 0.2s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.3);
}

.btn:active {
  transform: scale(0.96);
}
</style>
</head>

<body>

<div class="card">

  <div class="logo-circle">
    <img src="logo.png" id="logoImg">
  </div>

  <!-- 🔥 한글 이름 -->
  <div class="name-box" id="nameKo"></div>

  <!-- 영어 이름 -->
  <div class="eng" id="engName"></div>

  <!-- 버튼 -->
  <div class="button-group">

    <button class="btn" onclick="saveContact()">
      📇 연락처 저장
    </button>

    <a href="#" id="callBtn" class="btn">
      📞 전화 걸기
    </a>

    <a href="http://www.e-pki.com/" target="_blank" class="btn">
      🌐 PKI 홈페이지
    </a>

  </div>

</div>

<script>
/* 🔥 직원 정보 (여기만 수정하면 됨) */
const CONTACT = {
  nameKo: "김경원 (金景媛)",
  name: "Ellie Kim",
  firstName: "Ellie",
  lastName: "Kim",
  title: "Manager",
  telMobile: "+821020381341"
};

/* 화면 반영 */
document.getElementById("nameKo").innerText = CONTACT.nameKo;
document.getElementById("engName").innerText = CONTACT.name;

/* 전화 버튼 */
document.getElementById("callBtn").href = "tel:" + CONTACT.telMobile;

/* 원형 이미지 base64 */
async function getCircularBase64Image() {
  const img = document.getElementById("logoImg");

  const size = Math.min(img.naturalWidth, img.naturalHeight);
  const canvas = document.createElement("canvas");
  canvas.width = size;
  canvas.height = size;

  const ctx = canvas.getContext("2d");

  ctx.beginPath();
  ctx.arc(size/2, size/2, size/2, 0, Math.PI*2);
  ctx.clip();

  const sx = (img.naturalWidth - size) / 2;
  const sy = (img.naturalHeight - size) / 2;

  ctx.drawImage(img, sx, sy, size, size, 0, 0, size, size);

  return canvas.toDataURL("image/png").replace(/^data:image\/(png|jpg);base64,/, "");
}

/* 연락처 저장 */
async function saveContact() {
  const base64Logo = await getCircularBase64Image();

  const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:${CONTACT.name}
N:${CONTACT.lastName};${CONTACT.firstName};;;
ORG:PKI
TITLE:${CONTACT.title}
TEL;TYPE=CELL:${CONTACT.telMobile}
PHOTO;ENCODING=b;TYPE=PNG:${base64Logo}
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "contact.vcf";
  link.click();
}
</script>

</body>
</html>
