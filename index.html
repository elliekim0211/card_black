<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PKI Card</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

body {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(135deg, #2b2b2b, #4a4a4a);
  color:#fff;
}

/* 카드 */
.card {
  width:320px;
  padding:25px;
  border-radius:25px;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
}

/* 로고 */
.logo-circle {
  width:80px;
  height:80px;
  border-radius:50%;
  overflow:hidden;
  margin:0 auto 15px;
}

.logo-circle img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* 이름 */
.name-box {
  text-align:center;
  background:#ff7a00;
  padding:6px 12px;
  border-radius:10px;
  margin-bottom:5px;
}

.eng {
  text-align:center;
  color:#ff9a3c;
  margin-bottom:15px;
}

/* 🔥 연락처 정보 */
.info {
  margin-bottom:20px;
  line-height:2;
  font-size:14px;
}

.info div {
  display:flex;
  gap:8px;
}

.info strong {
  width:18px;
  color:#ddd;
}

.info a {
  color:#fff;
  text-decoration:none;
}

/* 버튼 */
.button-group {
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn {
  padding:12px;
  border-radius:14px;
  background: rgba(255,255,255,0.2);
  text-align:center;
  color:#fff;
  text-decoration:none;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo-circle">
    <img src="logo.png" id="logoImg">
  </div>

  <div class="name-box" id="nameKo"></div>
  <div class="eng" id="engName"></div>

  <!-- 🔥 연락처 정보 -->
  <div class="info">
    <div><strong>T:</strong> <a id="telWork"></a></div>
    <div><strong>F:</strong> <span id="fax"></span></div>
    <div><strong>M:</strong> <a id="telMobile"></a></div>
    <div><strong>E:</strong> <a id="email"></a></div>
  </div>

  <!-- 🔥 버튼 -->
  <div class="button-group">
    <button class="btn" onclick="saveContact()">📇 연락처 저장</button>
    <a href="#" id="callBtn" class="btn">📞 전화 걸기</a>
    <a href="http://www.e-pki.com/" target="_blank" class="btn">🌐 PKI 홈페이지</a>
  </div>

</div>

<script>
/* 🔥 변수 (여기만 수정) */
const CONTACT = {
  nameKo: "김경원 (金景媛)",
  name: "Ellie Kim",
  firstName: "Ellie",
  lastName: "Kim",
  title: "Manager",
  telWork: "+82313787590",
  fax: "+82313787591",
  telMobile: "+821020381341",
  email: "ellie.kim@e-pki.com"
};

/* 🔥 화면 반영 */
document.getElementById("nameKo").innerText = CONTACT.nameKo;
document.getElementById("engName").innerText = CONTACT.name;

/* 연락처 */
const telWork = document.getElementById("telWork");
telWork.innerText = CONTACT.telWork;
telWork.href = "tel:" + CONTACT.telWork;

document.getElementById("fax").innerText = CONTACT.fax;

const telMobile = document.getElementById("telMobile");
telMobile.innerText = CONTACT.telMobile;
telMobile.href = "tel:" + CONTACT.telMobile;

const email = document.getElementById("email");
email.innerText = CONTACT.email;
email.href = "mailto:" + CONTACT.email;

/* 전화 버튼 */
document.getElementById("callBtn").href = "tel:" + CONTACT.telMobile;

/* 🔥 vCard 저장 */
function saveContact() {
  const vcard =
`BEGIN:VCARD
VERSION:3.0
FN:${CONTACT.name}
N:${CONTACT.lastName};${CONTACT.firstName};;;
ORG:PKI
TITLE:${CONTACT.title}
TEL;TYPE=WORK:${CONTACT.telWork}
TEL;TYPE=CELL:${CONTACT.telMobile}
EMAIL:${CONTACT.email}
END:VCARD`;

  const blob = new Blob([vcard], { type: "text/vcard" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "contact.vcf";
  link.click();
}
</script>

</body>
</html>
